name: Generate deterministic npm lockfile

on:
  push:
    branches:
      - security/deterministic-npm-dependencies

permissions:
  contents: write

jobs:
  lockfile-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22

      - name: Generate lockfile without lifecycle scripts
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validate deterministic install without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Commit generated lockfile to the hardening branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git commit -m "chore(deps): add deterministic npm lockfile"
          git push origin HEAD:security/deterministic-npm-dependencies
