name: Generate deterministic npm lockfile

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lockfile-and-build:
    if: github.head_ref == 'security/deterministic-npm-dependencies'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22

      - name: Generate lockfile without lifecycle scripts
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validate deterministic install without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Upload generated lockfile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-package-lock
          path: package-lock.json
          if-no-files-found: error
          retention-days: 1
